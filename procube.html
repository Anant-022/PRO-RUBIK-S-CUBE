<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile-Friendly 3D Rubik's Cube</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #ui-top { position: absolute; top: 15px; left: 10px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
        #timer { position: absolute; top: 15px; right: 15px; font-family: monospace; font-size: 1.5rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; border: 1px solid #444; }
        
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; background: #333; color: white; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-solve { background: #28a745; }
        .btn-scramble { background: #007bff; }
        .btn-reset { background: #dc3545; } /* New Reset Button Styling */

        /* Background Picker and Keyboard Hint */
        .tools { background: rgba(0,0,0,0.6); padding: 8px; border-radius: 6px; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .tools input[type="color"] { cursor: pointer; border: none; padding: 0; width: 25px; height: 25px; background: none; }
        .keyboard-hint { color: #aaa; font-size: 11px; margin-top: 4px; line-height: 1.4; }

        /* Mobile Controls Bottom */
        #mobile-controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; width: 90%; max-width: 400px;
        }
        .face-btn { background: #444; height: 50px; font-size: 18px; }
        
        #status { position: absolute; bottom: 180px; width: 100%; text-align: center; font-size: 1rem; color: #aaa; pointer-events: none; text-shadow: 1px 1px 2px black;}
        
        .toggle-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px; grid-column: span 3; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #f44336; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div id="ui-top">
    <button class="btn-scramble" onclick="window.scramble()">Scramble</button>
    <button class="btn-solve" onclick="window.solve()">Auto-Solve</button>
    <button class="btn-reset" onclick="window.resetCube()">Reset Cube</button>
    
    <div class="tools">
        <div style="display: flex; align-items: center; gap: 10px;">
            <label for="bgColorPicker">Background:</label>
            <input type="color" id="bgColorPicker" value="#111111" onchange="window.changeBg(this.value)">
        </div>
        <div class="keyboard-hint">
            <strong>PC Controls:</strong><br>
            Keys: R, L, U, D, F, B<br>
            (Hold Shift for Counter-Clockwise)
        </div>
    </div>
</div>

<div id="timer">00:00</div>
<div id="status">Ready</div>

<div id="mobile-controls">
    <div class="toggle-row">
        <span>Clockwise</span>
        <label class="switch">
            <input type="checkbox" id="directionToggle">
            <span class="slider"></span>
        </label>
        <span>Counter</span>
    </div>
    <button class="face-btn" onclick="window.handleMobileMove('U')">U</button>
    <button class="face-btn" onclick="window.handleMobileMove('D')">D</button>
    <button class="face-btn" onclick="window.handleMobileMove('L')">L</button>
    <button class="face-btn" onclick="window.handleMobileMove('R')">R</button>
    <button class="face-btn" onclick="window.handleMobileMove('F')">F</button>
    <button class="face-btn" onclick="window.handleMobileMove('B')">B</button>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const COLORS = [0xffffff, 0xffff00, 0xffa500, 0xff0000, 0x00ff00, 0x0000ff]; 
    const FACE_NAMES = ['R', 'L', 'U', 'D', 'F', 'B'];
    let moveStack = [];
    let isMoving = false;
    
    // Timer variables
    let startTime, timerInterval;
    let timerRunning = false;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#111111'); // Initial Background Color

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(7, 7, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.rotateSpeed = 0.5;

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);

    const cubies = [];
    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    // Create shared geometry and materials to save memory on resets
    const baseGeom = new THREE.BoxGeometry(0.97, 0.97, 0.97);
    const baseMaterials = COLORS.map(c => new THREE.MeshLambertMaterial({ color: c }));

    function createCube() {
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const mesh = new THREE.Mesh(baseGeom, baseMaterials);
                    mesh.position.set(x, y, z);
                    cubies.push(mesh);
                    cubeGroup.add(mesh);
                }
            }
        }
    }
    createCube();

    function updateTimer() {
        const now = Date.now();
        const diff = now - startTime;
        const mins = Math.floor(diff / 60000).toString().padStart(2, '0');
        const secs = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${mins}:${secs}`;
    }

    async function rotateFace(face, clockwise = true, record = true) {
        if (isMoving) return;
        isMoving = true;

        if (record) {
            if (!timerRunning) {
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                timerRunning = true;
            }
            moveStack.push({ face, clockwise });
        }

        const pivot = new THREE.Group();
        scene.add(pivot);
        
        const activeCubies = cubies.filter(c => {
            const pos = new THREE.Vector3();
            c.getWorldPosition(pos);
            if (face === 'R') return pos.x > 0.5;
            if (face === 'L') return pos.x < -0.5;
            if (face === 'U') return pos.y > 0.5;
            if (face === 'D') return pos.y < -0.5;
            if (face === 'F') return pos.z > 0.5;
            if (face === 'B') return pos.z < -0.5;
        });

        activeCubies.forEach(c => pivot.attach(c));

        const axis = (face === 'R' || face === 'L') ? new THREE.Vector3(1, 0, 0) :
                     (face === 'U' || face === 'D') ? new THREE.Vector3(0, 1, 0) :
                     new THREE.Vector3(0, 0, 1);
        
        const direction = (face === 'L' || face === 'D' || face === 'B') ? 1 : -1;
        const angle = (clockwise ? 1 : -1) * direction * Math.PI / 2;

        const duration = 200;
        const start = performance.now();

        return new Promise(resolve => {
            function animateMove(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                pivot.rotation.set(0,0,0);
                pivot.rotateOnAxis(axis, angle * progress);

                if (progress < 1) {
                    requestAnimationFrame(animateMove);
                } else {
                    pivot.updateMatrixWorld();
                    activeCubies.forEach(c => cubeGroup.attach(c));
                    scene.remove(pivot);
                    isMoving = false;
                    resolve();
                }
            }
            requestAnimationFrame(animateMove);
        });
    }

    // --- Global Controls ---

    // 1. Mobile Buttons
    window.handleMobileMove = (face) => {
        const isCounter = document.getElementById('directionToggle').checked;
        rotateFace(face, !isCounter);
    };

    // 2. Background Change Logic
    window.changeBg = (colorHex) => {
        scene.background = new THREE.Color(colorHex);
    };

    // 3. Reset Logic
    window.resetCube = () => {
        if (isMoving) return; // Prevent resetting mid-animation

        clearInterval(timerInterval);
        document.getElementById('timer').innerText = "00:00";
        timerRunning = false;
        moveStack = [];

        // Remove existing cubies
        while(cubeGroup.children.length > 0) { 
            cubeGroup.remove(cubeGroup.children[0]); 
        }
        cubies.length = 0; // Clear the tracking array
        
        // Rebuild clean cube
        createCube();
        
        document.getElementById('status').innerText = "Cube Reset!";
    };

    // 4. Keyboard Controls (PC compatibility)
    window.addEventListener('keydown', (e) => {
        const key = e.key.toUpperCase();
        if (FACE_NAMES.includes(key)) {
            rotateFace(key, !e.shiftKey);
        }
    });

    window.scramble = async () => {
        if(isMoving) return;
        clearInterval(timerInterval);
        document.getElementById('timer').innerText = "00:00";
        timerRunning = false;
        document.getElementById('status').innerText = "Scrambling...";
        for (let i = 0; i < 12; i++) {
            const face = FACE_NAMES[Math.floor(Math.random() * 6)];
            await rotateFace(face, true);
        }
        document.getElementById('status').innerText = "Scrambled!";
    };

    window.solve = async () => {
        if (moveStack.length === 0 || isMoving) return;
        document.getElementById('status').innerText = "Auto-Solving...";
        while (moveStack.length > 0) {
            const lastMove = moveStack.pop();
            await rotateFace(lastMove.face, !lastMove.clockwise, false); 
        }
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('status').innerText = "Solved!";
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
